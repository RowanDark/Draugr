kit: financial
patterns:
  - name: Credit Card Visa
    regex: '4[0-9]{3}[\s\-]?[0-9]{4}[\s\-]?[0-9]{4}[\s\-]?[0-9]{4}'
    category: Financial Data
    severity: high

  - name: Credit Card MasterCard
    regex: '5[1-5][0-9]{2}[\s\-]?[0-9]{4}[\s\-]?[0-9]{4}[\s\-]?[0-9]{4}'
    category: Financial Data
    severity: high

  - name: Credit Card Amex
    regex: '3[47][0-9]{2}[\s\-]?[0-9]{6}[\s\-]?[0-9]{5}'
    category: Financial Data
    severity: high

  - name: Credit Card Discover
    regex: '6(?:011|5[0-9]{2})[0-9]{12}'
    category: Financial Data
    severity: high

  - name: Credit Card Generic
    regex: '\b(?:\d[ -]*?){13,16}\b'
    category: Financial Data
    severity: medium

  - name: CVV Code
    regex: '\b(?:cvv|cvc|cvn|cvv2|cvc2)[\s:]+[0-9]{3,4}\b'
    category: Financial Data
    severity: high

  - name: SSN
    regex: '\b\d{3}-\d{2}-\d{4}\b'
    category: Financial Data
    severity: high

  - name: IBAN
    regex: '\b[A-Z]{2}\d{2}[A-Z0-9]{4}\d{7}([A-Z0-9]?){0,16}\b'
    category: Financial Data
    severity: high

  - name: Bitcoin Address
    regex: '\b[13][a-km-zA-HJ-NP-Z1-9]{25,34}\b'
    category: Financial Data
    severity: medium

  - name: Bitcoin Private Key
    regex: '[5KL][1-9A-HJ-NP-Za-km-z]{50,51}'
    category: Financial Data
    severity: high

  - name: Ethereum Address
    regex: '0x[a-fA-F0-9]{40}'
    category: Financial Data
    severity: medium

  - name: Bank Account Number
    regex: '\b[0-9]{8,17}\b'
    category: Financial Data
    severity: medium

  - name: Routing Number
    regex: '\b(?:routing|aba|rtn)[\s:#]+[0-9]{9}\b'
    category: Financial Data
    severity: high

  - name: SWIFT Code
    regex: '\b[A-Z]{6}[A-Z0-9]{2}(?:[A-Z0-9]{3})?\b'
    category: Financial Data
    severity: medium
