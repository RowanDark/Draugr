kit: credentials
patterns:
  - name: MongoDB Connection String
    regex: 'mongodb(?:\+srv)?://[^"\s]+'
    category: Database & Infrastructure
    severity: high

  - name: PostgreSQL Connection
    regex: 'postgres://[^"\s]+'
    category: Database & Infrastructure
    severity: high

  - name: MySQL Connection
    regex: 'mysql://[^"\s]+'
    category: Database & Infrastructure
    severity: high

  - name: Redis URL
    regex: 'redis://[^"\s]+'
    category: Database & Infrastructure
    severity: high

  - name: JDBC Connection String
    regex: 'jdbc:[a-z]+://[^"\s]+'
    category: Database & Infrastructure
    severity: high

  - name: Database Password
    regex: '(?i)(?:database|db)[_\-\s]?(?:password|pass|pwd)[\s:=]+["'']?([^"''\s]+)["'']?'
    category: Database & Infrastructure
    severity: high

  - name: Connection String with Password
    regex: '(?i)(?:password|pwd|pass)=([^;&\s"'']+)'
    category: Database & Infrastructure
    severity: high

  - name: SQL Server Connection
    regex: '(?i)(?:server|data source)=[^;]+;(?:uid|user id)=[^;]+;(?:pwd|password)=([^;]+)'
    category: Database & Infrastructure
    severity: high

  - name: Elasticsearch URL
    regex: '(?:http|https)://[^:]+:[^@]+@[^/]+:[0-9]+'
    category: Database & Infrastructure
    severity: high

  - name: Docker Registry Auth
    regex: '(?i)docker[_\-\s]?(?:registry[_\-\s]?)?(?:auth|password)[\s:=]+["'']?([a-zA-Z0-9+/=]+)["'']?'
    category: Database & Infrastructure
    severity: high

  - name: Kubernetes Config
    regex: '(?i)kubeconfig|kubectl[^"]*?(?:token|certificate)'
    category: Database & Infrastructure
    severity: medium

  - name: SSH Private Key
    regex: '-----BEGIN (?:RSA |DSA |EC |OPENSSH )?PRIVATE KEY-----'
    category: Database & Infrastructure
    severity: high

  - name: PGP Private Key
    regex: '-----BEGIN PGP PRIVATE KEY BLOCK-----'
    category: Database & Infrastructure
    severity: high
